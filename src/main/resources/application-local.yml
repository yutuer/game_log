# ============================================================
#  本地开发模式（覆盖 application.yml 中的云默认值）
#
#  激活方式：
#    1. IDE 启动时加 --spring.profiles.active=local
#    2. 或设置环境变量 SPRING_PROFILES_ACTIVE=local
#    3. 或直接改 application.yml 中的 spring.profiles.active=local
# ============================================================

# 异步写入配置 — 本地高性能（大 batch + 快刷写）
async:
  writer:
    batch-size: ${ASYNC_BATCH_SIZE:3000}
    flush-interval-ms: ${ASYNC_FLUSH_INTERVAL_MS:500}

# Spring 配置覆盖
spring:
  datasource:
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:2}
  devtools:
    restart:
      enabled: true

# 日志 — 本地开发时输出更详细
logging:
  level:
    com.gamelog: DEBUG
