server:
  port: 8080

spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/game_log?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true&cachePrepStmts=true&prepStmtCacheSize=25&prepStmtCacheSqlLimit=2048}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:2}
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1.0.6
    locations: classpath:db/migration
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# 异步写入配置
async:
  writer:
    queue-capacity: ${ASYNC_QUEUE_CAPACITY:20000}
    batch-size: ${ASYNC_BATCH_SIZE:6000}
    flush-interval-ms: ${ASYNC_FLUSH_INTERVAL_MS:500}

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,shutdown
  endpoint:
    shutdown:
      enabled: true

# 日志配置
logging:
  level:
    root: WARN
    com.gamelog: INFO
