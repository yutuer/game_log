server:
  port: 8080

spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/game_log?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:5}
      minimum-idle: ${HIKARI_MIN_IDLE:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# 异步写入配置
async:
  writer:
    core-pool-size: ${ASYNC_CORE_POOL_SIZE:2}
    max-pool-size: ${ASYNC_MAX_POOL_SIZE:4}
    queue-capacity: ${ASYNC_QUEUE_CAPACITY:10000}
    batch-size: ${ASYNC_BATCH_SIZE:100}
    flush-interval-ms: ${ASYNC_FLUSH_INTERVAL_MS:1000}
